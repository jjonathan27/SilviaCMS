<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS Pro - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-900 text-slate-200 font-sans h-screen overflow-hidden flex">

    <nav class="w-64 bg-slate-800 border-r border-slate-700 flex flex-col transition-all duration-300 z-20" id="sidebar">
        <div class="p-6 border-b border-slate-700 flex justify-between items-center">
            <h2 class="text-xl font-bold text-indigo-400">CMS Pro</h2>
        </div>
        <ul class="flex-1 overflow-y-auto py-4 space-y-1">
            <li>
                <a href="#pages" class="nav-link flex items-center px-6 py-3 text-slate-300 hover:bg-slate-700 hover:text-white transition-colors duration-200 focus-visible:ring-2 focus-visible:ring-inset focus-visible:ring-indigo-500">
                    <span class="mr-3">📄</span> Páginas
                </a>
            </li>
            <li>
                <a href="#sections" class="nav-link flex items-center px-6 py-3 text-slate-300 hover:bg-slate-700 hover:text-white transition-colors duration-200">
                    <span class="mr-3">🧩</span> Secciones
                </a>
            </li>
            <li>
                <a href="#users" class="nav-link flex items-center px-6 py-3 text-slate-300 hover:bg-slate-700 hover:text-white transition-colors duration-200">
                    <span class="mr-3">👥</span> Usuarios
                </a>
            </li>
        </ul>
        <div class="p-4 border-t border-slate-700">
            <div class="text-sm mb-3">
                <span class="block text-slate-400">Conectado como:</span>
                <span id="userRoleDisplay" class="font-semibold text-indigo-300">Cargando...</span>
            </div>
            <button id="logoutBtn" class="w-full py-2 text-sm text-red-400 border border-red-400/30 rounded hover:bg-red-400/10 transition-colors">
                Cerrar Sesión
            </button>
        </div>
    </nav>

    <main class="flex-1 flex flex-col relative h-full overflow-hidden">
        <header class="h-16 bg-slate-900/80 backdrop-blur-sm border-b border-slate-700 flex items-center px-8 z-10">
            <h1 id="moduleTitle" class="text-2xl font-semibold text-white">Dashboard</h1>
        </header>
        
        <section id="app" class="flex-1 p-8 overflow-y-auto custom-scrollbar relative">
            </section>
    </main>

    <div id="toastContainer" class="fixed bottom-5 right-5 z-50 flex flex-col space-y-2"></div>

    <dialog id="confirmModal" class="bg-transparent backdrop:bg-slate-900/80 p-0 rounded-xl shadow-2xl m-auto z-50 border-0">
        <div class="bg-slate-800 border border-slate-700 w-96 rounded-xl p-6 shadow-2xl text-slate-200">
            <h3 class="text-xl font-semibold mb-2 text-white">¿Estás seguro?</h3>
            <p class="text-slate-400 text-sm mb-6">Esta acción no se puede deshacer y el registro será eliminado permanentemente.</p>
            <div class="flex justify-end space-x-3">
                <button id="cancelModalBtn" class="px-4 py-2 rounded-lg text-sm font-medium hover:bg-slate-700 transition-colors">Cancelar</button>
                <button id="confirmModalBtn" class="px-4 py-2 rounded-lg text-sm font-medium bg-red-600 hover:bg-red-700 text-white transition-colors shadow-md">Eliminar</button>
            </div>
        </div>
    </dialog>
    
    <dialog id="pageModal" class="bg-transparent backdrop:bg-slate-900/80 p-0 rounded-xl shadow-2xl m-auto z-50 border-0">
        <div class="bg-slate-800 border border-slate-700 w-[500px] rounded-xl shadow-2xl overflow-hidden">
            <div class="px-6 py-4 border-b border-slate-700 flex justify-between items-center bg-slate-900/50">
                <h3 id="pageModalTitle" class="text-lg font-semibold text-white">Nueva Página</h3>
                <button type="button" onclick="closeModal('pageModal')" class="text-slate-400 hover:text-white">&times;</button>
            </div>
            <form id="pageForm" class="p-6 space-y-4">
                <input type="hidden" id="pageId">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">Título</label>
                    <input type="text" id="pageTitle" required class="w-full px-3 py-2 bg-slate-900 border border-slate-600 rounded-lg text-white focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">Ruta (Slug)</label>
                    <input type="text" id="pageSlug" required placeholder="/mi-pagina" class="w-full px-3 py-2 bg-slate-900 border border-slate-600 rounded-lg text-white focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">Estado</label>
                    <select id="pageStatus" class="w-full px-3 py-2 bg-slate-900 border border-slate-600 rounded-lg text-white focus:ring-2 focus:ring-indigo-500 outline-none">
                        <option value="Borrador">Borrador</option>
                        <option value="Publicado">Publicado</option>
                    </select>
                </div>
                <div class="flex justify-end space-x-3 pt-4 border-t border-slate-700">
                    <button type="button" onclick="closeModal('pageModal')" class="px-4 py-2 rounded-lg text-sm text-slate-300 hover:bg-slate-700">Cancelar</button>
                    <button type="submit" class="px-4 py-2 rounded-lg text-sm font-medium bg-indigo-600 hover:bg-indigo-700 text-white shadow-md">Guardar</button>
                </div>
            </form>
        </div>
    </dialog>

    <dialog id="userModal" class="bg-transparent backdrop:bg-slate-900/80 p-0 rounded-xl shadow-2xl m-auto z-50 border-0">
        <div class="bg-slate-800 border border-slate-700 w-[500px] rounded-xl shadow-2xl overflow-hidden">
            <div class="px-6 py-4 border-b border-slate-700 flex justify-between items-center bg-slate-900/50">
                <h3 id="userModalTitle" class="text-lg font-semibold text-white">Nuevo Usuario</h3>
                <button type="button" onclick="closeModal('userModal')" class="text-slate-400 hover:text-white">&times;</button>
            </div>
            <form id="userForm" class="p-6 space-y-4">
                <input type="hidden" id="userId">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">Nombre Completo</label>
                    <input type="text" id="userName" required class="w-full px-3 py-2 bg-slate-900 border border-slate-600 rounded-lg text-white focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">Correo Electrónico</label>
                    <input type="email" id="userEmail" required class="w-full px-3 py-2 bg-slate-900 border border-slate-600 rounded-lg text-white focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">Rol del Sistema</label>
                    <select id="userRole" class="w-full px-3 py-2 bg-slate-900 border border-slate-600 rounded-lg text-white focus:ring-2 focus:ring-indigo-500 outline-none">
                        <option value="Colaborador">Colaborador</option>
                        <option value="Admin">Administrador</option>
                    </select>
                </div>
                <div class="flex justify-end space-x-3 pt-4 border-t border-slate-700">
                    <button type="button" onclick="closeModal('userModal')" class="px-4 py-2 rounded-lg text-sm text-slate-300 hover:bg-slate-700">Cancelar</button>
                    <button type="submit" class="px-4 py-2 rounded-lg text-sm font-medium bg-indigo-600 hover:bg-indigo-700 text-white shadow-md">Guardar</button>
                </div>
            </form>
        </div>
    </dialog>

    <dialog id="previewModal" class="bg-transparent backdrop:bg-slate-900/80 p-0 rounded-xl shadow-2xl m-auto z-50 border-0 w-full max-w-4xl">
        <div class="bg-white rounded-xl shadow-2xl overflow-hidden h-[80vh] flex flex-col">
            <div class="bg-slate-200 border-b border-slate-300 px-4 py-3 flex items-center space-x-2">
                <div class="flex space-x-1.5">
                    <div class="w-3 h-3 rounded-full bg-red-400"></div>
                    <div class="w-3 h-3 rounded-full bg-amber-400"></div>
                    <div class="w-3 h-3 rounded-full bg-green-400"></div>
                </div>
                <div class="ml-4 bg-white px-3 py-1 rounded-md text-sm text-slate-500 flex-1 font-mono border border-slate-300" id="previewUrl">
                    localhost:3000/
                </div>
                <button onclick="closeModal('previewModal')" class="text-slate-500 hover:text-slate-800 font-bold px-2">Cerrar Preview</button>
            </div>
            <div class="p-10 flex-1 overflow-y-auto bg-slate-50 text-slate-900">
                <h1 id="previewTitle" class="text-4xl font-bold text-slate-800 mb-6">Título</h1>
                <div class="h-4 bg-slate-200 rounded w-3/4 mb-4"></div>
                <div class="h-4 bg-slate-200 rounded w-full mb-4"></div>
                <div class="h-4 bg-slate-200 rounded w-5/6 mb-8"></div>
                <div class="h-64 bg-slate-200 rounded-lg w-full flex items-center justify-center text-slate-400 border-2 border-dashed border-slate-300">
                    Área de Bloques / Componentes
                </div>
            </div>
        </div>
    </dialog>

    <script src="app.js"></script>
</body>
</html>
