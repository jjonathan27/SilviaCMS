<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS Pro - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-900 text-slate-200 font-sans min-h-screen flex items-center justify-center">

    <main class="w-full max-w-md p-8 glass-effect rounded-2xl shadow-2xl border border-slate-700/50">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-indigo-400 mb-2">CMS Pro</h1>
            <p class="text-sm font-medium" style="color: var(--accent-gold);">Ingresa tus credenciales para continuar</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label for="email" class="block text-sm font-medium text-slate-300 mb-1">Correo Electrónico</label>
                <input type="email" id="email" required placeholder="admin@cmspro.com" 
                    class="form-control w-full" style="background: var(--background-dark); color: var(--text-light);">
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-slate-300 mb-1">Contraseña</label>
                <input type="password" id="password" required placeholder="••••••••" 
                    class="form-control w-full" style="background: var(--background-dark); color: var(--text-light);">
            </div>
            
            <button type="submit" 
                class="w-full py-2 px-4 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-lg shadow-md transition-colors duration-200 focus-visible:ring-4 focus-visible:ring-indigo-500/50">
                Iniciar Sesión
            </button>
            <p class="text-xs text-center font-semibold" style="color: var(--text-light);">Tip: Usa admin@cmspro.com para rol Admin, o collab@cmspro.com para rol Colaborador.</p>
        </form>
    </main>

    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            // Simulador de autenticación y asignación de roles
            const role = email.includes('admin') ? 'Admin' : 'Colaborador';
            
            const session = { email, role, token: 'xyz-789', isAuthenticated: true };
            localStorage.setItem('cms_session', JSON.stringify(session));
            window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
